<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jonna's Aubergine 🍆</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6750A4">
    <link rel="apple-touch-icon" href="/icon.svg">
    <!-- Tailwind CSS 3 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Dexie.js CDN -->
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="h-screen overflow-hidden flex flex-col md:flex-row">
    <!-- Navigation Rail (Desktop) / Bottom Nav (Mobile) -->
    <nav class="order-2 md:order-1 w-full md:w-24 h-16 md:h-full border-t md:border-t-0 md:border-r border-[var(--m3-outline)]/20 flex flex-row md:flex-col items-center py-0 md:py-8 z-50 bg-[var(--m3-surface)]">
        <div class="flex flex-row md:flex-col items-center justify-around md:justify-start w-full md:w-auto gap-2 md:gap-8 grow relative">
            <button onclick="setView('home')" class="flex flex-col items-center gap-1 group md:w-full">
                <div id="nav-home" class="nav-rail-icon active">
                    <i data-lucide="home"></i>
                </div>
                <span class="text-[10px] md:text-[11px] font-medium">Home</span>
            </button>

            <button onclick="setView('search')" class="flex flex-col items-center gap-1 group md:w-full">
                <div id="nav-search" class="nav-rail-icon inactive">
                    <i data-lucide="search"></i>
                </div>
                <span class="text-[10px] md:text-[11px] font-medium">Search</span>
            </button>

            <button onclick="setView('favorites')" class="flex flex-col items-center gap-1 group md:w-full">
                <div id="nav-favorites" class="nav-rail-icon inactive">
                    <i data-lucide="heart"></i>
                </div>
                <span class="text-[10px] md:text-[11px] font-medium">Favorites</span>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="order-1 md:order-2 flex-1 flex flex-col h-[calc(100vh-5rem)] md:h-full bg-[var(--m3-surface)] relative overflow-hidden">
        <!-- Header -->
        <header class="px-6 md:px-8 pt-6 md:pt-8 pb-4 flex flex-col gap-4">
            <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
                <div>
                    <h1 id="view-title" class="text-3xl md:text-4xl font-bold tracking-tight text-[var(--m3-on-surface)]">Jonna's Aubergine 🍆</h1>
                    <p id="view-subtitle" class="text-[var(--m3-on-surface-variant)] text-sm md:text-base mt-1">Discover your culinary journey</p>
                </div>
            </div>
            
            <!-- Search Bar (Conditional via JS/CSS Class) -->
            <div id="search-container" class="relative w-full hidden">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-[var(--m3-on-surface-variant)] opacity-50"></i>
                <input 
                    type="text" 
                    id="search-input" 
                    placeholder="Search titles, descriptions, ingredients..." 
                    class="w-full bg-[var(--m3-surface-variant)] border-none rounded-2xl py-3.5 pl-11 pr-4 text-base focus:ring-2 focus:ring-[var(--m3-primary)]/20 outline-none transition-all"
                    oninput="handleSearch(this.value)"
                >
            </div>

            <div class="flex gap-2 overflow-x-auto w-full pb-2 scrollbar-hide" id="category-filters">
                <!-- Categories populated by JS -->
            </div>
        </header>
                <!-- Categories populated by JS -->
            </div>
        </header>

        <!-- Scrollable Content -->
        <div id="recipe-grid" class="flex-1 overflow-y-auto px-6 md:px-8 py-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 align-start content-start">
            <!-- Recipes populated by JS -->
        </div>

        <!-- Global FAB -->
        <button onclick="openForm()" class="fixed right-6 bottom-24 md:bottom-8 w-16 h-16 bg-[#D0BCFF] text-[#381E72] rounded-2xl flex items-center justify-center shadow-xl hover:shadow-2xl transition-all active:scale-90 z-[80] group">
            <i data-lucide="plus" class="w-8 h-8 group-hover:rotate-90 transition-transform duration-300"></i>
        </button>
    </main>

    <!-- Recipe Detail Modal -->
    <div id="detail-modal" class="fixed inset-0 bg-[var(--m3-surface)] z-[100] hidden flex flex-col overflow-hidden">
        <!-- Content populated by JS -->
    </div>

    <!-- Recipe Form Modal -->
    <div id="form-modal" class="fixed inset-0 bg-[var(--m3-surface)] z-[110] hidden flex flex-col overflow-hidden">
        <header class="flex items-center justify-between px-6 py-4 border-b border-[var(--m3-outline)]/10">
            <button onclick="closeForm()" class="p-2 hover:bg-[var(--m3-surface-variant)] rounded-full text-[var(--m3-on-surface)]">
                <i data-lucide="x"></i>
            </button>
            <h2 id="form-title" class="text-xl font-bold text-[var(--m3-on-surface)]">New Recipe</h2>
            <button onclick="saveRecipe()" class="m3-button-filled !px-6 !py-2">Save</button>
        </header>

        <form id="recipe-form" class="flex-1 overflow-y-auto px-6 md:px-8 py-8 space-y-8" onsubmit="event.preventDefault(); saveRecipe();">
            <input type="hidden" id="form-id">
            
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 md:gap-12">
                <!-- Left Column -->
                <div class="space-y-6">
                    <div class="aspect-video bg-[var(--m3-surface-variant)]/50 rounded-[24px] md:rounded-[28px] relative overflow-hidden flex items-center justify-center border-2 border-dashed border-[var(--m3-outline)]">
                        <img id="form-image-preview" src="" class="hidden w-full h-full object-cover">
                        <div id="form-image-placeholder" class="text-center text-[var(--m3-on-surface-variant)]">
                            <i data-lucide="camera" class="mx-auto mb-2 opacity-50"></i>
                            <p class="text-sm opacity-50">Click to add photo</p>
                        </div>
                        <input type="file" id="form-image-input" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" onchange="previewImage(this)">
                    </div>

                    <div class="space-y-4">
                        <div>
                            <label class="text-xs font-bold ml-1 mb-1 block uppercase tracking-wider text-[var(--m3-on-surface-variant)]">Title</label>
                            <input type="text" id="form-recipe-title" class="m3-input text-[var(--m3-on-surface)]" placeholder="e.g. Classic Margherita Pizza" required>
                        </div>
                        <div>
                            <label class="text-xs font-bold ml-1 mb-1 block uppercase tracking-wider text-[var(--m3-on-surface-variant)]">Description</label>
                            <textarea id="form-recipe-desc" class="m3-input min-h-[100px] text-[var(--m3-on-surface)]" placeholder="A short story about this recipe..."></textarea>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-xs font-bold ml-1 mb-1 block uppercase tracking-wider text-[var(--m3-on-surface-variant)]">Prep Time</label>
                            <input type="text" id="form-prep" class="m3-input text-[var(--m3-on-surface)]" placeholder="15 mins">
                        </div>
                        <div>
                            <label class="text-xs font-bold ml-1 mb-1 block uppercase tracking-wider text-[var(--m3-on-surface-variant)]">Cook Time</label>
                            <input type="text" id="form-cook" class="m3-input text-[var(--m3-on-surface)]" placeholder="30 mins">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-xs font-bold ml-1 mb-1 block uppercase tracking-wider text-[var(--m3-on-surface-variant)]">Servings</label>
                            <input type="number" id="form-servings" class="m3-input text-[var(--m3-on-surface)]" value="2">
                        </div>
                        <div>
                            <label class="text-xs font-bold ml-1 mb-1 block uppercase tracking-wider text-[var(--m3-on-surface-variant)]">Category</label>
                            <select id="form-category" class="m3-input text-[var(--m3-on-surface)]">
                                <option value="Breakfast">Breakfast</option>
                                <option value="Lunch">Lunch</option>
                                <option value="Dinner" selected>Dinner</option>
                                <option value="Dessert">Dessert</option>
                                <option value="Snack">Snack</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Right Column -->
                <div class="space-y-8 pb-12 lg:pb-0">
                    <section>
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-xl font-bold text-[var(--m3-on-surface)]">Ingredients</h3>
                            <button type="button" onclick="addIngredientField()" class="p-2 text-[var(--m3-primary)] hover:bg-[var(--m3-primary)]/10 rounded-full">
                                <i data-lucide="plus"></i>
                            </button>
                        </div>
                        <div id="form-ingredients-list" class="space-y-3">
                            <!-- Populated by JS -->
                        </div>
                    </section>

                    <section>
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-xl font-bold text-[var(--m3-on-surface)]">Instructions</h3>
                            <button type="button" onclick="addInstructionField()" class="p-2 text-[var(--m3-primary)] hover:bg-[var(--m3-primary)]/10 rounded-full">
                                <i data-lucide="plus"></i>
                            </button>
                        </div>
                        <div id="form-instructions-list" class="space-y-3">
                            <!-- Populated by JS -->
                        </div>
                    </section>
                </div>
            </div>
        </form>
    </div>

    <!-- Scripts -->
    <script src="app.js"></script>
</body>
</html>
